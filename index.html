<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akan Name Generator</title>
</head>
<body>
    <header>
        <h1>AKAN NAME GENERATOR</h1>
        <h3>This name generator assigns you a name based on the day of the week you were born, as well as your gender.</h3>
    </header>


    <div class="forms">
        <form id="infoForm">    
            <label for="dateOfBirth">Please enter your Date Of Birth: </label><br>
            <input type="date" id="dateOfBirth" name="dateOfBirth" required><br>

            <!-- RADIO -->
            <label for="gender">Please choose your gender:</label><br>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label><br>
            <input type="radio" id="female" name="gender" value="female" required>
            <label for="female">Female</label><br>

            <!-- SUBMIT -->
            <input type="submit" value="submit">
        </form>
    </div>
</body>
</html>
